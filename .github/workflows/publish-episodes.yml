name: Publish Episodes

on:
  push:
    branches: [main]
    paths: [episodes/**]

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Upload episodes to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="episodes"

          # Ensure the release exists
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Podcast Episodes" --notes "Auto-published podcast episode files."

          # Upload all episode files, overwriting existing assets
          for f in episodes/*.mp3 episodes/*.vtt; do
            [ -f "$f" ] || continue
            echo "Uploading $f..."
            gh release upload "$TAG" "$f" --clobber
          done
